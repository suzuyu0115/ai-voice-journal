name: Update Project Status

on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Set status based on PR event
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          PROJECT_ID: PVT_kwHOBsGTAc4BZ8Ky
          STATUS_FIELD_ID: PVTSSF_lAHOBsGTAc4BZ8KyzhU3SPw
          STATUS_IN_PROGRESS: 47fc9ee4
          STATUS_DONE: 98236657
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          # PR body から "Closes #X" の Issue 番号を抽出
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oP '(?i)(closes|fixes|resolves)\s+#\K[0-9]+' || true)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "No linked issues found in PR body."
            exit 0
          fi

          # マージ済みなら Done、それ以外は In Progress
          if [ "$PR_MERGED" = "true" ]; then
            STATUS_OPTION="$STATUS_DONE"
            STATUS_NAME="Done"
          else
            STATUS_OPTION="$STATUS_IN_PROGRESS"
            STATUS_NAME="In Progress"
          fi

          for ISSUE_NUM in $ISSUE_NUMBERS; do
            echo "Setting Issue #$ISSUE_NUM to '$STATUS_NAME'..."

            # Issue の node ID を取得
            ISSUE_ID=$(gh api graphql -f query="
              { repository(owner: \"suzuyu0115\", name: \"ai-voice-journal\") {
                  issue(number: $ISSUE_NUM) { id }
              } }" --jq '.data.repository.issue.id')

            if [ -z "$ISSUE_ID" ]; then
              echo "Issue #$ISSUE_NUM not found."
              continue
            fi

            # Project 上のアイテム ID を取得（なければ追加）
            ITEM_ID=$(gh api graphql -f query="
              { user(login: \"suzuyu0115\") {
                  projectV2(number: 6) {
                    items(first: 50) {
                      nodes {
                        id
                        content { ... on Issue { id } }
                      }
                    }
                  }
              } }" --jq ".data.user.projectV2.items.nodes[] | select(.content.id == \"$ISSUE_ID\") | .id")

            if [ -z "$ITEM_ID" ]; then
              echo "Adding Issue #$ISSUE_NUM to project..."
              ITEM_ID=$(gh api graphql -f query="
                mutation {
                  addProjectV2ItemById(input: {
                    projectId: \"$PROJECT_ID\"
                    contentId: \"$ISSUE_ID\"
                  }) { item { id } }
                }" --jq '.data.addProjectV2ItemById.item.id')
            fi

            # ステータスを更新
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_OPTION\" }
                }) { projectV2Item { id } }
              }"

            echo "✅ Issue #$ISSUE_NUM → $STATUS_NAME"
          done
